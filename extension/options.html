<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Billing Bridge Options</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .container {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0 0 20px;
        color: #475569;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input[type="url"] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        font-size: 14px;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      #save-btn {
        background: #0f172a;
        color: #fff;
      }
      #reset-btn {
        background: #e2e8f0;
        color: #0f172a;
      }
      #status {
        font-size: 13px;
        color: #475569;
      }
      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #64748b;
      }
      code {
        background: #f1f5f9;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Model Billing Bridge</h1>
        <p>Configure the Billing URL opened by the floating button.</p>
        <label for="billing-url">Billing URL</label>
        <input id="billing-url" type="url" placeholder="https://billing.example.com/billing" />
        <div class="hint">Must start with <code>http://</code> or <code>https://</code>.</div>
        <div class="actions">
          <button id="save-btn" type="button">Save</button>
          <button id="reset-btn" type="button">Reset to default</button>
          <span id="status"></span>
        </div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
