# Replace billing.example.com and gateway.example.com with your real domains.

server {
    listen 443 ssl http2;
    server_name billing.example.com;

    ssl_certificate     /etc/nginx/ssl/billing.example.com_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/billing.example.com.key;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name billing.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gateway.example.com;

    ssl_certificate     /etc/nginx/ssl/gateway.example.com_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/gateway.example.com.key;

    location /v1/ {
        proxy_pass                 http://127.0.0.1:8080;
        proxy_http_version         1.1;
        proxy_set_header           Host $host;
        proxy_set_header           X-Real-IP $remote_addr;
        proxy_set_header           X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header           X-Forwarded-Proto $scheme;
        proxy_buffering            off;
        proxy_cache                off;
        proxy_set_header           Connection "";
        proxy_read_timeout         300s;
        proxy_send_timeout         300s;
        chunked_transfer_encoding  on;
    }

    location / {
        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name gateway.example.com;
    return 301 https://$host$request_uri;
}
